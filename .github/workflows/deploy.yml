name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: CI=false npm run build
        env:
          REACT_APP_apiKey: ${{ secrets.REACT_APP_APIKEY }}
          REACT_APP_authDomain: movie-app-proje.firebaseapp.com
          REACT_APP_projectId: movie-app-proje
          REACT_APP_storageBucket: movie-app-proje.firebasestorage.app
          REACT_APP_messagingSenderId: "371979280916"
          REACT_APP_appId: "${{ secrets.REACT_APP_APPID }}"
          REACT_APP_TMDB_KEY: "${{ secrets.REACT_APP_TMDB_KEY }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
